{% extends "base.html" %}
{% block title %}Register — LUMINARY{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <h1 class="auth-card__title">Create account</h1>
    <p class="auth-card__sub">Join LUMINARY today</p>

    <form method="POST" action="{{ url_for('register') }}" class="auth-form">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" class="input" required autofocus placeholder="your_name" />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" class="input" required placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" class="input" required placeholder="At least 8 characters" />
      </div>
      <div class="form-group">
        <label>Confirm password</label>
        <input type="password" name="confirm" class="input" required placeholder="••••••••" />
      </div>
      <button type="submit" class="btn btn--primary btn--full btn--lg">Create account</button>
    </form>

    <p class="auth-card__switch">
      Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
    </p>
  </div>
</div>
{% endblock %}
