{% extends "base.html" %}
{% block title %}Sign in — LUMINARY{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <h1 class="auth-card__title">Welcome back</h1>
    <p class="auth-card__sub">Sign in to your LUMINARY account</p>

    <form method="POST" action="{{ url_for('login') }}" class="auth-form">
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" class="input" required autofocus placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" class="input" required placeholder="••••••••" />
      </div>
      <div class="form-check">
        <input type="checkbox" name="remember" id="remember" />
        <label for="remember">Keep me signed in</label>
      </div>
      <button type="submit" class="btn btn--primary btn--full btn--lg">Sign in</button>
    </form>

    <p class="auth-card__switch">
      Don't have an account? <a href="{{ url_for('register') }}">Register</a>
    </p>
  </div>
</div>
{% endblock %}
